<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>夏祭りプロジェクション</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  transform: scaleX(-1);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  });

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let lastFirework = 0;
let lastBalloon = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 640,
  height: 480
});
camera.start();

function onResults(results) {
  if (!results.multiHandLandmarks) return;

  const now = Date.now();

  for (const landmarks of results.multiHandLandmarks) {

    const wrist = landmarks[0];
    const indexTip = landmarks[8];
    const thumbTip = landmarks[4];

    // 花火
    if (wrist.y < 0.5 && now - lastFirework > 300) {
      triggerFireworks();
      lastFirework = now;
    }

    // OKサイン
    const dx = thumbTip.x - indexTip.x;
    const dy = thumbTip.y - indexTip.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 0.08 && now - lastBalloon > 300) {
      triggerBalloon(
        (1 - thumbTip.x) * canvas.width,
        thumbTip.y * canvas.height
      );
      lastBalloon = now;
    }
  }
}

let fireParticles = [];

function triggerFireworks() {

  const centerX = Math.random() * canvas.width;
  const centerY = Math.random() * canvas.height * 0.5;

  for (let i = 0; i < 80; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6;

    fireParticles.push({
      x: centerX,
      y: centerY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 60,
      color: "orange",
      size: 3
    });
  }
}

function triggerBalloon(startX, startY) {

  for (let i = 0; i < 10; i++) {

    const angle = (Math.random() - 0.5) * 0.5;
    const speed = 2 + Math.random();

    fireParticles.push({
      x: startX,
      y: startY,
      vx: Math.cos(angle) * speed,
      vy: -Math.abs(Math.sin(angle) * speed) - 1.5,
      life: 80,
      color: "pink",
      size: 8
    });
  }
}

function animate() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < fireParticles.length; i++) {
    const p = fireParticles[i];

    ctx.fillStyle = p.color || "orange";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size || 3, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
  }

  fireParticles = fireParticles.filter(p => p.life > 0);

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
